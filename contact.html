<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact | Andy Myers Psychotherapy</title>

<style>
:root {
  --bg: #f6f2ee;
  --text: #2f2a27;
  --muted: #6f6a66;
  --accent: #7b9e8e;
  --card: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}

header {
  background: rgba(232,226,220,0.9);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid #ddd6cf;
  position: sticky;
  top: 0;
  z-index: 10;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  margin-left: 1.5rem;
  text-decoration: none;
  color: var(--text);
  font-size: 0.95rem;
}

nav a:hover { color: var(--accent); }

.logo { height: 72px; width: auto; }

section { padding: 4.5rem 1.5rem; }

.availability,
.card {
  background: var(--card);
  padding: 3rem;
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.06);
  max-width: 720px;
  margin-bottom: 3rem;
}

.availability h2 { margin-bottom: 1.5rem; }

.day-label { margin-top: 1.5rem; font-weight: 500; }

.mode { font-size: 0.85rem; color: var(--muted); }

.slot-btn {
  display: inline-block;
  margin: 0.15rem 0.15rem 0.15rem 0;
  padding: 0.3rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.75rem;
}

.slot-btn:hover {
  background: var(--accent);
  color: #fff;
}

label { display: block; font-size: 0.9rem; margin-bottom: 0.4rem; color: var(--muted); }

input, textarea {
  width: 100%;
  padding: 0.75rem;
  margin-bottom: 1.5rem;
  border-radius: 10px;
  border: 1px solid #d6d0ca;
  font-family: inherit;
}

textarea { min-height: 140px; }

button[type="submit"] {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0.8rem 1.6rem;
  border-radius: 999px;
  cursor: pointer;
}

footer {
  background: #b37242;
  color: black;
  padding: 1rem 0.5rem;
  text-align: center;
}
</style>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>
<header>
  <div class="container">
    <nav>
      <a href="index.html"><img src="logo.png" class="logo" /></a>
      <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="socials.html">Socials</a>
      </div>
    </nav>
  </div>
</header>

<main>
<section>
<div class="container">

<div class="availability">
<h2>Request an Available Time</h2>

<div class="day-label">Monday <span class="mode">(In person)</span></div>
<div id="monday"></div>

<div class="day-label">Tuesday <span class="mode">(Online)</span></div>
<div id="tuesday"></div>

<div class="day-label">Wednesday <span class="mode">(Online)</span></div>
<div id="wednesday"></div>

<div class="day-label">Thursday <span class="mode">(Online)</span></div>
<div id="thursday"></div>

<div class="day-label">Friday <span class="mode">(In person)</span></div>
<div id="friday"></div>

<script>
function requestSlot(slot) {
  const messageBox = document.getElementById("message");
  messageBox.value = "I would like to request the following appointment time: " + slot;
  document.getElementById("contactFormSection").scrollIntoView({ behavior: "smooth" });
}

function generateSlots(day, mode, elementId) {
  const container = document.getElementById(elementId);
  container.innerHTML = "";
  for (let hour = 11; hour <= 19; hour++) {
    let displayHour = hour > 12 ? hour - 12 : hour;
    let suffix = hour >= 12 ? "pm" : "am";

    const btn = document.createElement("button");
    btn.className = "slot-btn";
    btn.textContent = displayHour + ":00" + suffix;
    btn.onclick = function() {
      requestSlot(day + " " + displayHour + ":00" + suffix + " (" + mode + ")");
    };

    container.appendChild(btn);
  }
}

["Monday","Tuesday","Wednesday","Thursday","Friday"].forEach(day => {
  let mode = (day=="Monday"||day=="Friday")?"In person":"Online";
  generateSlots(day, mode, day.toLowerCase());
});
</script>
</div>

<div class="card" id="contactFormSection">
<form id="contactForm" action="https://formspree.io/f/xojnzjpw" method="POST">

<label>Forename</label>
<input type="text" name="name" required />

<label>Surname</label>
<input type="text" name="surname" required />

<label>Phone number</label>
<input type="tel" name="phone" />

<label>Email</label>
<input type="email" name="email" required />

<label>Message</label>
<textarea id="message" name="message" required></textarea>

<div class="g-recaptcha" data-sitekey="6Ldd834sAAAAAPZWAHCgiNVRdRA4PiD2hO__Qm59"></div>

<button type="submit">Send message</button>
</form>
<p id="formResponse"></p>
</div>

</div>
</section>
</main>

<footer>
<div class="container">
<p>2026 Andy Myers Psychotherapy Practice</p>
<p>Registered and insured.</p>
<a href="privacy.html"><u>Privacy policy</u></a>
</div>
</footer>
</body>
</html>
